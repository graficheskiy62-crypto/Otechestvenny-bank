<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Отечественный банк</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Lucida Sans Unicode', sans-serif; user-select: none; }
    body { background: #121212; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
    
    #app {
      position: relative;
      width: 500px;
      height: 800px;
      max-width: 100%;
      background: #1e1e1e;
      overflow: hidden;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    }

    /* ФОН */
    #bg {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background-size: cover; background-position: center; background-repeat: no-repeat;
      transition: background-image 0.4s ease; z-index: 0;
    }

    /* КОНТЕНТ */
    #ui {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center;
      height: 100%; padding: 20px; gap: 12px; overflow-y: auto; padding-top: 90px;
    }

    #money { font-size: 28px; color: #fff; text-shadow: 0 2px 6px rgba(0,0,0,0.9); margin-bottom: 10px; }

    button {
      background: #059e0c; color: #fff; border: none; border-radius: 0;
      width: 240px; height: 90px; font-size: 18px; cursor: pointer;
      transition: background 0.2s, transform 0.1s; box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    }
    button:hover { background: #04bf0d; }
    button:active { transform: scale(0.96); }
    button:disabled { background: #4a4a4a; color: #888; cursor: not-allowed; transform: none; }

    /* КНОПКА КЛИКА */
    #click-btn {
      background-color: #059e0c;
      background-image: url('photo.png');
      background-size: contain; background-repeat: no-repeat; background-position: center;
      height: 150px; width: 150px; margin: 20px 0; text-indent: -9999px;
    }
    #click-btn:hover { background-color: #04bf0d; }

    /* КАЗИНО */
    #casino-btn { background: #d4af37; color: #000; font-weight: bold; height: 50px; width: 240px; margin-top: 10px; }
    #casino-btn:hover { background: #b8941f; }

    .bg-upg.purchased { display: none; }

    /* МОДАЛЬНОЕ ОКНО */
    .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); display: flex; justify-content: center; align-items: center; z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
    .modal.active { opacity: 1; pointer-events: auto; }
    .modal-content { background: #252525; padding: 30px; border-radius: 12px; text-align: center; width: 90%; max-width: 360px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
    .modal-content h2 { color: #fff; margin-bottom: 15px; }
    .modal-content p { color: #ccc; margin-bottom: 10px; font-size: 15px; }
    #bet-input { width: 100%; padding: 12px; margin-bottom: 15px; background: #333; border: 1px solid #555; color: #fff; font-size: 18px; border-radius: 6px; text-align: center; }
    #casino-result { min-height: 45px; margin-bottom: 15px; font-weight: bold; line-height: 1.4; }
    #play-btn { background: #d4af37; color: #000; height: 45px; margin-bottom: 10px; font-weight: bold; }
    #play-btn:hover { background: #b8941f; }
    #close-casino { background: #555; height: 45px; }
    #close-casino:hover { background: #666; }
  </style>
</head>
<body>

  <div id="app">
    <div id="bg"></div>
    <div id="ui">
      <div id="money">рубли: 0</div>
      <button id="click-btn">КЛИК</button>
      <button id="upg-click">улучшить клик за 50₽</button>
      
      <button class="bg-upg" data-price="100" data-bg="dacha.png">улучшение рубля (100₽)</button>
      <button class="bg-upg" data-price="1000" data-bg="old.png">улучшение дома (1000₽)</button>
      <button class="bg-upg" data-price="100000" data-bg="medium.png">улучшение дома (100 000₽)</button>
      <button class="bg-upg" data-price="10000000" data-bg="rich.png">улучшение дома (10 000 000₽)</button>
      <button class="bg-upg" data-price="1000000000" data-bg="ultra_rich.png">улучшение дома (1 000 000 000₽)</button>
      <button class="bg-upg" data-price="1000000000000" data-bg="sea.png">улучшение дома (1 000 000 000 000₽)</button>
      <button class="bg-upg" data-price="1000000000000000" data-bg="moon.png">улучшение дома (1 000 000 000 000 000₽)</button>
      
      <button id="casino-btn">🎰 Перейти в казино</button>
    </div>
  </div>

  <!-- Модалка казино -->
  <div id="casino-modal" class="modal">
    <div class="modal-content">
      <h2>🎰 Казино</h2>
      <p>Введите сумму ставки:</p>
      <input type="number" id="bet-input" placeholder="Сумма" inputmode="numeric">
      <div id="casino-result"></div>
      <button id="play-btn">Крутить</button>
      <button id="close-casino">Закрыть</button>
    </div>
  </div>

<script>
  // ==================== ПЕРЕМЕННЫЕ ====================
  let money = 0;
  let clickPower = 1;
  let upgradeCost = 50;

  const bgEl = document.getElementById('bg');
  const moneyEl = document.getElementById('money');
  const clickBtn = document.getElementById('click-btn');
  const upgClickBtn = document.getElementById('upg-click');
  const bgUpgBtns = document.querySelectorAll('.bg-upg');
  const casinoModal = document.getElementById('casino-modal');
  const betInput = document.getElementById('bet-input');
  const casinoResult = document.getElementById('casino-result');

  // Установка начального фона
  bgEl.style.backgroundImage = "url('start.png')";

  // ==================== ВСПОМОГАТЕЛЬНЫЕ ====================
  function formatNum(n) {
    return n.toLocaleString('ru-RU');
  }

  function updateUI() {
    moneyEl.textContent = `рубли: ${formatNum(money)}`;
    
    // Кнопка улучшения клика
    if (money >= upgradeCost) {
      upgClickBtn.disabled = false;
      upgClickBtn.textContent = `улучшить клик за ${formatNum(upgradeCost)}₽`;
    } else {
      upgClickBtn.disabled = true;
      upgClickBtn.textContent = `нужно для улучшения клика ${formatNum(upgradeCost)}₽`;
    }

    // Кнопки фонов
    bgUpgBtns.forEach(btn => {
      if (!btn.classList.contains('purchased')) {
        const price = parseInt(btn.dataset.price);
        btn.disabled = money < price;
      }
    });
  }

  // ==================== ЛОГИКА ИГРЫ ====================
  clickBtn.addEventListener('click', () => {
    money += clickPower;
    updateUI();
  });

  upgClickBtn.addEventListener('click', () => {
    if (money >= upgradeCost) {
      money -= upgradeCost;
      clickPower++;
      upgradeCost = Math.floor(upgradeCost * 1.5);
      updateUI();
    }
  });

  bgUpgBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      const price = parseInt(btn.dataset.price);
      if (money >= price) {
        money -= price;
        btn.classList.add('purchased'); // Скрываем купленное
        bgEl.style.backgroundImage = `url('${btn.dataset.bg}')`;
        updateUI();
      }
    });
  });

  // ==================== КАЗИНО ====================
  document.getElementById('casino-btn').addEventListener('click', () => {
    casinoModal.classList.add('active');
    casinoResult.textContent = '';
    betInput.value = '';
  });

  document.getElementById('close-casino').addEventListener('click', () => {
    casinoModal.classList.remove('active');
  });

  // Закрытие по клику на фон
  casinoModal.addEventListener('click', (e) => {
    if (e.target === casinoModal) casinoModal.classList.remove('active');
  });

  document.getElementById('play-btn').addEventListener('click', () => {
    const val = betInput.value.trim();
    if (!val) { showCasinoMsg('Введите число!', 'red'); return; }
    
    const bet = parseInt(val);
    if (isNaN(bet) || bet <= 0) { showCasinoMsg('Ставка должна быть > 0', 'red'); return; }
    if (bet > money) { showCasinoMsg('Недостаточно рублей!', 'red'); return; }

    money -= bet;
    const win = Math.random() < 0.5; // 50% шанс

    if (win) {
      const payout = Math.floor(bet * 1.5);
      money += payout;
      showCasinoMsg(`🎉 Выигрыш! +${formatNum(payout)}₽\nБаланс: ${formatNum(money)}₽`, '#00cc44');
    } else {
      showCasinoMsg(`❌ Проигрыш! -${formatNum(bet)}₽\nБаланс: ${formatNum(money)}₽`, '#ff4444');
    }
    updateUI();
  });

  function showCasinoMsg(text, color) {
    casinoResult.textContent = text;
    casinoResult.style.color = color;
  }

  // ==================== ЗАПУСК ====================
  updateUI();
</script>

</body>
</html>
